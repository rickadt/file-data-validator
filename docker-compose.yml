version: '3.8'
services:
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spreadsheet_validator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net

volumes:
  postgres_data:

networks:
  net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.102.0.0/24
          gateway: 10.102.0.1
