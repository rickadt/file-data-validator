{% extends 'base.html' %}

{% block title %}Add Spreadsheet{% endblock %}

{% block content %}
    <h1>Add a New Spreadsheet</h1>
    <form method="post">
        <label for="name">Spreadsheet Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>
        <button type="submit">Add Spreadsheet</button>
    </form>
{% endblock %}
