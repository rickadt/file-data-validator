{% extends 'base.html' %}

{% block title %}Upload Spreadsheet{% endblock %}

{% block content %}
    <h1>Upload a Spreadsheet for Validation</h1>
    <form method="post" enctype="multipart/form-data">
        <label for="file">Choose a CSV or XLSX file:</label>
        <input type="file" id="file" name="file" accept=".csv, .xlsx">
        <br><br>
        <label for="spreadsheet_id">Select Spreadsheet Configuration:</label>
        <select name="spreadsheet_id" id="spreadsheet_id">
            {% for spreadsheet in spreadsheets %}
                <option value="{{ spreadsheet.id }}">{{ spreadsheet.name }}</option>
            {% endfor %}
        </select>
        <br><br>
        <button type="submit">Upload and Validate</button>
    </form>
{% endblock %}
